AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Aether Backend Services

Globals:
  Function:
    Timeout: 15
    Runtime: python3.11
    Architecture: x86_64
    Environment:
      Variables:
        USERS_TABLE: !Ref AetherUsersTable

Resources:
  AetherUsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AetherUsers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/src/
      Handler: health.lambda_handler
      Events:
        HealthApi:
          Type: Api
          Properties:
            Path: /health
            Method: get